{% extends 'base.html' %}
{% load wagtailcore_tags %}

{% block content %}
    <h1>{{ page.title }}</h1>
    {{ page.intro|richtext }}

    <form action="{% pageurl page %}" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">{{ page.submit_button }}</button>
    </form>
{% endblock %}
